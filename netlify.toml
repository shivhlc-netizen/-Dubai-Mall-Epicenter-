[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"

[functions]
  directory = "netlify/functions"

[functions."cron-gemini-pulse"]
  schedule = "0 0 * * 2,5" # Tuesday and Friday at 00:00 UTC

[functions."resilient-automation"]
  schedule = "@daily"

# Redirect all 404s to home for SPA-like behavior
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = "200"
  force = false
