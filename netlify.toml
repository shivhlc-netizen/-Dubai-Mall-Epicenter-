[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NEXTAUTH_URL = "https://dubai-mall-epicenter.netlify.app"

[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000
  autoLaunch = false

# ─── Plugins ─────────────────────────────────────────────────────────────────
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─── Functions (v1 + v2 coexist in same directory) ───────────────────────────
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# v1 Scheduled Functions
[functions."cron-gemini-pulse"]
  schedule = "0 0 * * 0"           # Sunday midnight UTC

[functions."resilient-automation"]
  schedule = "0 0 * * 0"           # Sunday midnight UTC

# v2 Scheduled Functions
[functions."send-weekly-digest"]
  schedule = "0 9 * * 0"           # Sunday 9am UTC

[functions."cleanup-expired-tokens"]
  schedule = "0 2 * * 0"           # Sunday 2am UTC

[functions."refresh-pulse-cache"]
  schedule = "0 3 * * 0"           # Sunday 3am UTC

# ─── Edge Functions (directory auto-detected as netlify/edge-functions/) ─────
[[edge_functions]]
  function = "geo-welcome"
  path = "/"

[[edge_functions]]
  function = "api-ratelimit"
  path = "/api/*"

# ─── Headers ─────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, s-maxage=2592000"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://dubai-mall-epicenter.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# ─── Redirects ───────────────────────────────────────────────────────────────
[[redirects]]
  from = "/mall"
  to = "/"
  status = 301

[[redirects]]
  from = "/shop"
  to = "/#directory"
  status = 302

[[redirects]]
  from = "/dining"
  to = "/#directory"
  status = 302

[[redirects]]
  from = "/luxury"
  to = "/#directory"
  status = 302

[[redirects]]
  from = "/events"
  to = "/#directory"
  status = 302

# v2 function short-URL aliases
[[redirects]]
  from = "/api/fn/*"
  to = "/.netlify/functions/:splat"
  status = 200

# ─── Image CDN ───────────────────────────────────────────────────────────────
[images]
  remote_images = [
    "https://images.unsplash.com",
    "https://plus.unsplash.com"
  ]

# ─── Context overrides ───────────────────────────────────────────────────────
[context.production.environment]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"

[context.deploy-preview.environment]
  NODE_ENV = "development"

[context.branch-deploy.environment]
  NODE_ENV = "development"
